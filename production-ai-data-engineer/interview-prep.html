<title>Production AI &amp; Data Engineer — Interview Prep</title>
<style>
  :root {
    --bg: #f3f1ea;
    --surface: #ffffff;
    --surface-2: #eae7dd;
    --ink: #1c2129;
    --muted: #5b6472;
    --hairline: #d8d4c8;
    --accent: #c97a1a;
    --accent-ink: #ffffff;
    --accent2: #2f8f82;
    --good: #2f8f5a;
    --bad: #c1442e;
    --shadow: 0 1px 2px rgba(28,33,41,0.06), 0 8px 24px rgba(28,33,41,0.06);
    --radius: 14px;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171c;
      --surface: #1c212a;
      --surface-2: #232a34;
      --ink: #e8e6df;
      --muted: #8b93a1;
      --hairline: #2c333e;
      --accent: #e8a33d;
      --accent-ink: #1c1207;
      --accent2: #4fb6a8;
      --good: #59c98a;
      --bad: #e8695a;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 28px rgba(0,0,0,0.35);
    }
  }
  :root[data-theme="dark"] {
    --bg: #14171c; --surface: #1c212a; --surface-2: #232a34; --ink: #e8e6df;
    --muted: #8b93a1; --hairline: #2c333e; --accent: #e8a33d; --accent-ink: #1c1207;
    --accent2: #4fb6a8; --good: #59c98a; --bad: #e8695a;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 28px rgba(0,0,0,0.35);
  }
  :root[data-theme="light"] {
    --bg: #f3f1ea; --surface: #ffffff; --surface-2: #eae7dd; --ink: #1c2129;
    --muted: #5b6472; --hairline: #d8d4c8; --accent: #c97a1a; --accent-ink: #ffffff;
    --accent2: #2f8f82; --good: #2f8f5a; --bad: #c1442e;
    --shadow: 0 1px 2px rgba(28,33,41,0.06), 0 8px 24px rgba(28,33,41,0.06);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 20px 20px 60px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-height: 100%;
  }

  /* ---------- Header ---------- */
  .app-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .app-title-block { display: flex; flex-direction: column; gap: 4px; min-width: 260px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
  }
  h1 {
    margin: 0;
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 700;
    letter-spacing: -0.01em;
    text-wrap: balance;
  }
  .subtitle { margin: 0; color: var(--muted); font-size: 14px; max-width: 50ch; }

  .hud {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .hud-stat {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 8px 14px;
    min-width: 76px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .hud-stat .num {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: 20px;
    font-weight: 600;
    line-height: 1.1;
  }
  .hud-stat .lbl {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .hud-stat.streak .num { color: var(--accent); }
  .hud-stat.mastered .num { color: var(--accent2); }

  /* ---------- Mode switch ---------- */
  .mode-switch {
    display: inline-flex;
    background: var(--surface-2);
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
    border: 1px solid var(--hairline);
  }
  .mode-switch button {
    border: none;
    background: transparent;
    color: var(--muted);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .mode-switch button.active {
    background: var(--accent);
    color: var(--accent-ink);
  }

  /* ---------- Layout ---------- */
  .layout {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ---------- Rail (signal chain nav) ---------- */
  .rail {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    padding: 10px;
    box-shadow: var(--shadow);
    position: sticky;
    top: 16px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }
  .rail-title {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 8px 10px 4px;
  }
  .node {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 9px 10px;
    border-radius: 9px;
    cursor: pointer;
    color: var(--ink);
    position: relative;
  }
  .node:hover { background: var(--surface-2); }
  .node.active { background: var(--surface-2); }
  .node.active .node-id { border-color: var(--accent); color: var(--accent); }
  .node-id {
    font-family: var(--mono);
    font-size: 11px;
    width: 22px;
    height: 22px;
    flex: none;
    border-radius: 50%;
    border: 1.5px solid var(--hairline);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .node.mastered .node-id {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #08302b;
  }
  .node-label { font-size: 13px; line-height: 1.25; }
  .node-thread {
    position: absolute;
    left: 20px;
    top: 34px;
    width: 1.5px;
    height: calc(100% - 10px);
    background: var(--hairline);
    z-index: 0;
  }
  .node:last-child .node-thread { display: none; }

  .node.priority { margin-bottom: 6px; }
  .node.priority .node-id {
    border-color: var(--accent);
    color: var(--accent);
    font-size: 13px;
  }
  .node.priority.active { background: color-mix(in srgb, var(--accent) 14%, var(--surface)); }
  .node.priority.active .node-id { background: var(--accent); color: var(--accent-ink); }
  .rail-divider { height: 1px; background: var(--hairline); margin: 4px 6px 8px; }

  /* ---------- Main stage ---------- */
  .stage {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
    min-height: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .stage-header { display: flex; flex-direction: column; gap: 6px; }
  .stage-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stage-eyebrow.priority { color: var(--accent); }
  .stage-title { font-size: 19px; font-weight: 700; margin: 0; text-wrap: balance; }

  /* ---------- Flip cards (Learn mode) ---------- */
  .flip-card {
    perspective: 1200px;
    height: 220px;
  }
  .flip-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.5s cubic-bezier(.2,.7,.3,1);
    transform-style: preserve-3d;
    cursor: pointer;
  }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    padding: 18px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    border: 1px solid var(--hairline);
    overflow: auto;
  }
  .flip-front {
    background: var(--surface-2);
  }
  .flip-front .q-mark {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .flip-front .term { font-size: 17px; font-weight: 700; text-wrap: balance; }
  .flip-back {
    background: var(--accent2);
    color: #08221f;
    transform: rotateY(180deg);
    font-size: 13.5px;
    line-height: 1.5;
  }
  .flip-back.priority-back { background: var(--accent); color: #241705; }
  .priority-ref {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    opacity: 0.85;
    border-top: 1px solid rgba(0,0,0,0.15);
    padding-top: 6px;
    margin-top: 2px;
  }
  .flip-hint {
    margin-top: auto;
    font-family: var(--mono);
    font-size: 10px;
    opacity: 0.75;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  @media (prefers-reduced-motion: reduce) {
    .flip-inner { transition: none; }
    .flip-card.flipped .flip-front { display: none; }
    .flip-card:not(.flipped) .flip-back { display: none; }
    .flip-card.flipped .flip-inner, .flip-inner { transform: none; }
    .flip-back { transform: none; }
  }

  .stage-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 6px;
    border-top: 1px solid var(--hairline);
  }
  .stage-nav button {
    border: 1px solid var(--hairline);
    background: var(--surface-2);
    color: var(--ink);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .stage-nav button:disabled { opacity: 0.4; cursor: default; }
  .stage-nav .pos { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  /* ---------- Quiz mode ---------- */
  .quiz-progress-bar {
    height: 6px;
    border-radius: 999px;
    background: var(--surface-2);
    overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 999px;
    transition: width 0.35s ease;
  }
  .quiz-card {
    background: var(--surface-2);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .quiz-module-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .quiz-question { font-size: 17px; font-weight: 600; line-height: 1.35; text-wrap: balance; }
  .quiz-options {
    display: grid;
    gap: 8px;
  }
  .quiz-option {
    text-align: left;
    border: 1px solid var(--hairline);
    background: var(--surface);
    color: var(--ink);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: center;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }
  .quiz-option:hover:not(:disabled) { border-color: var(--accent2); }
  .quiz-option .letter {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 18px;
    flex: none;
  }
  .quiz-option:disabled { cursor: default; }
  .quiz-option.correct { background: color-mix(in srgb, var(--good) 18%, var(--surface)); border-color: var(--good); }
  .quiz-option.wrong { background: color-mix(in srgb, var(--bad) 18%, var(--surface)); border-color: var(--bad); }
  .quiz-option.dim { opacity: 0.55; }

  .quiz-feedback {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 20px;
  }
  .quiz-feedback.correct { color: var(--good); }
  .quiz-feedback.wrong { color: var(--bad); }

  .quiz-next {
    align-self: flex-start;
    border: none;
    background: var(--accent);
    color: var(--accent-ink);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 10px;
    flex: 1;
    padding: 30px 10px;
  }
  .empty-state .big { font-size: 40px; }
  .empty-state h2 { margin: 0; font-size: 20px; }
  .empty-state p { margin: 0; color: var(--muted); max-width: 42ch; font-size: 14px; }
  .empty-state button {
    margin-top: 6px;
    border: none;
    background: var(--accent2);
    color: #08221f;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
  }
</style>

<div class="app">
  <header class="app-header">
    <div class="app-title-block">
      <span class="eyebrow">Production AI &amp; Data Engineer / LLMOps &amp; DataOps</span>
      <h1>12-Module Interview Prep</h1>
      <p class="subtitle">LLM fundamentals through security &amp; governance, plus a pinned "bet-money" top 10. Flip to learn, quiz to lock it in — wrong answers keep coming back until you get them.</p>
    </div>
    <div class="hud">
      <div class="hud-stat"><div class="num" id="hud-score">0</div><div class="lbl">Score</div></div>
      <div class="hud-stat streak"><div class="num" id="hud-streak">0</div><div class="lbl">Streak</div></div>
      <div class="hud-stat mastered"><div class="num" id="hud-mastered">0/12</div><div class="lbl">Mastered</div></div>
    </div>
  </header>

  <div class="mode-switch" role="tablist" aria-label="Mode">
    <button id="btn-learn" class="active" role="tab" aria-selected="true">Learn</button>
    <button id="btn-quiz" role="tab" aria-selected="false">Quiz</button>
  </div>

  <div class="layout">
    <nav class="rail" id="rail" aria-label="Modules"></nav>
    <main class="stage" id="stage"></main>
  </div>
</div>

<script>
(function () {
  "use strict";

  var MODULES = [
    {
      title: "LLM Basics",
      cards: [
        { term: "What is an LLM?", back: "A transformer-based neural network trained on huge text corpora to predict the next token given prior context. At scale, that next-token prediction generalizes into reasoning, summarization, coding, and more." },
        { term: "How does an LLM generate text?", back: "Autoregressively: it computes a probability distribution over the vocabulary for the next token, samples one, appends it, and repeats — one token at a time, conditioned on everything generated so far." },
        { term: "What are tokens?", back: "The atomic units the model operates on — sub-word pieces produced by a tokenizer (e.g. BPE), not full words or single characters. “Understanding” might be 2-3 tokens; a rare word might be many." },
        { term: "What is a context window?", back: "The max number of tokens (input + output combined) the model can attend to in one call. Everything outside it is invisible to the model — why RAG, summarization, and truncation strategies exist." },
        { term: "Why do hallucinations happen?", back: "The model is a next-token predictor optimized for plausible text, not a database. Without grounding (no retrieved fact, ambiguous prompt, out-of-distribution question) it still produces fluent, confident-sounding, possibly false output." },
        { term: "What is temperature?", back: "A sampling parameter that scales the probability distribution before picking the next token. Low temperature (near 0) = deterministic, most-likely output; high temperature = more randomness and diversity." },
        { term: "Why are prompts important?", back: "The prompt is your only steering mechanism at inference time — it sets task framing, tone, constraints, and available context. Small wording changes measurably change output, which is why prompts get versioned like code." },
        { term: "What are system prompts?", back: "A privileged instruction channel, separate from user turns, used to set persistent behavior — role, tone, constraints, safety rules — that should hold across the whole conversation regardless of what the user says." },
        { term: "What are function calls / tool calls?", back: "A structured output mode where the model emits a JSON-shaped request to invoke a specific function/API with specific arguments, instead of (or alongside) free text. Your code executes it and feeds the result back in." },
        { term: "What are the limitations of LLMs?", back: "Fixed context window, no persistent memory between calls unless you build it, hallucination risk, a knowledge cutoff, sensitivity to prompt phrasing, and no built-in guarantee of factual correctness or determinism." }
      ],
      quiz: [
        { q: "What does an LLM fundamentally do at each generation step?", options: ["Looks up the answer in a database", "Predicts a probability distribution over the next token and samples from it", "Executes a fixed rule-based script", "Retrieves the exact matching training example"], a: 1 },
        { q: "A “context window” refers to:", options: ["The model's total training data size", "The max number of tokens the model can attend to in one call", "The number of tools available to an agent", "The temperature setting"], a: 1 },
        { q: "Hallucinations happen mainly because:", options: ["The model deliberately deceives users", "It generates fluent, plausible text even without real grounding for it", "The context window is too large", "Tokens are case-sensitive"], a: 1 }
      ]
    },
    {
      title: "Prompting vs RAG vs Fine-Tuning",
      cards: [
        { term: "Explain the difference.", back: "Prompting steers the frozen model at call time (no new knowledge added). RAG injects fresh external knowledge into the prompt via retrieval. Fine-tuning updates the model's own weights on your examples, changing its default behavior." },
        { term: "When would you use RAG?", back: "When the model needs facts it wasn't trained on or that change often — internal docs, current data, per-customer content — and you need traceability back to a source." },
        { term: "When would you fine-tune?", back: "When you need consistent behavior — format, tone, domain jargon, a narrow task done a specific way — more than you need to inject new facts." },
        { term: "Why not fine-tune everything?", back: "It's expensive (data curation, training, retraining on every update), harder to keep current than swapping documents in an index, riskier (can degrade general ability), and gives no per-answer source attribution." },
        { term: "Why doesn't prompting solve missing knowledge?", back: "You can't prompt in facts the model was never trained on and doesn't have access to — it can only work with what's in its weights or explicitly placed in the context window." },
        { term: "Can RAG and fine-tuning be combined?", back: "Yes — fine-tune for consistent behavior/format/domain style, and layer RAG on top to inject current or proprietary facts. Common in production systems that need both correctness and consistency." },
        { term: "What are the costs/tradeoffs?", back: "Prompting: cheapest, fastest to iterate, weakest for changing facts. RAG: added infra and latency, but easy to update. Fine-tuning: highest upfront cost, but can bake in behavior prompting can't reliably force." },
        { term: "Which approach is best for changing regulations?", back: "RAG — regulations change frequently and answers need to be traceable to the current source document, not baked into weights that go stale." },
        { term: "Which approach is best for style consistency?", back: "Fine-tuning — if the model needs to reliably speak in one voice/format across thousands of interactions, prompting alone drifts over long or varied conversations." },
        { term: "Which approach is best for internal documents?", back: "RAG — internal docs change, are private, and need per-answer citation. Retrieval avoids retraining every time a document changes." }
      ],
      quiz: [
        { q: "Which approach is best when facts change frequently and need source traceability?", options: ["Fine-tuning", "RAG", "Prompting alone", "Increasing temperature"], a: 1 },
        { q: "Fine-tuning is the better fit when you need:", options: ["Fresh facts injected per query", "Consistent style/format/behavior baked in over many interactions", "The cheapest possible iteration speed", "Zero training data"], a: 1 },
        { q: "Why can't prompting alone fix missing knowledge?", options: ["Prompts can't exceed 100 words", "The model can only use what's in its weights or the context window — it can't use facts it never saw", "Prompting is more expensive than fine-tuning", "Prompting requires GPU training"], a: 1 }
      ]
    },
    {
      title: "Embeddings",
      cards: [
        { term: "What is an embedding?", back: "A numeric vector representation of text such that semantically similar inputs land close together in that vector space — produced by a model trained to preserve meaning as geometry." },
        { term: "Why do embeddings work?", back: "The embedding model is trained (contrastive / self-supervised objectives) so things used in similar contexts get similar vectors — meaning gets encoded as position and direction in high-dimensional space." },
        { term: "Why can “car” match “vehicle”?", back: "They occur in similar contexts across training data, so the model learns to place their vectors close together. The match is semantic, not a shared-character trick." },
        { term: "What is semantic similarity?", back: "How close two pieces of text are in meaning, measured by distance/angle between their embedding vectors — rather than by shared words or exact string overlap." },
        { term: "What is cosine similarity?", back: "The standard way to compare two embedding vectors: the cosine of the angle between them (1 = same direction/meaning, 0 = unrelated, -1 = opposite). Used because it ignores magnitude and focuses on direction." },
        { term: "Why not use keyword search?", back: "Keyword/lexical search misses synonyms, paraphrases, and conceptual matches — it only matches on literal token overlap, so a differently-worded question misses a relevant document." },
        { term: "What dimensions do embeddings have?", back: "A fixed-size vector, typically hundreds to a few thousand floats (e.g. 384, 768, 1536, 3072) depending on the model. Higher dimensionality can capture more nuance but costs more storage/compute." },
        { term: "Are embeddings deterministic?", back: "Yes for a given model version and input — same text in, same vector out. But different model versions/providers produce incompatible vector spaces, so you can't mix embeddings from different models in one index." },
        { term: "What makes a good embedding model?", back: "Strong semantic separation for your domain, appropriate dimensionality vs cost, multilingual support if needed, and stability — you don't want to re-embed your whole corpus after every provider update." },
        { term: "When would embeddings fail?", back: "Highly specific/rare terminology outside training data, exact-match needs (IDs, codes, precise numbers), or a domain so specialized the general model can't separate similar-looking but distinct concepts." }
      ],
      quiz: [
        { q: "An embedding is:", options: ["A compressed copy of the raw text", "A numeric vector positioning text by meaning in a shared space", "A hash of the string used for deduplication", "A summary generated by the LLM"], a: 1 },
        { q: "Cosine similarity measures:", options: ["The exact character overlap between two strings", "The angle between two vectors, indicating how similar their meaning/direction is", "The file size difference between documents", "The token count difference"], a: 1 },
        { q: "Keyword search underperforms semantic search because:", options: ["It's always slower to run", "It only matches literal token overlap and misses synonyms/paraphrases", "It can't be indexed at all", "It requires a GPU"], a: 1 }
      ]
    },
    {
      title: "RAG Pipeline",
      cards: [
        { term: "Explain the entire RAG pipeline.", back: "Ingest & chunk documents → embed each chunk → store vectors + metadata in a vector DB → at query time, embed the question → retrieve top-k nearest chunks → assemble them into the prompt → the LLM generates an answer grounded in that context." },
        { term: "What is chunking?", back: "Splitting documents into smaller pieces before embedding — embedding an entire document loses granularity (no citing just the relevant paragraph) and often exceeds context/embedding limits." },
        { term: "Why is chunk size important?", back: "Too small and you lose the context needed to answer; too large and you dilute relevance per chunk and burn context window space unnecessarily." },
        { term: "What are chunk overlap strategies?", back: "Letting consecutive chunks share a few sentences/tokens so information split across a boundary — like a definition starting at the end of one chunk — isn't lost to either side." },
        { term: "Why does retrieval fail?", back: "Poor chunking, a query phrased very differently from the source wording despite meaning the same thing, an embedding model mismatched to domain vocabulary, or genuinely missing/stale content in the index." },
        { term: "How do tables affect RAG?", back: "Naive text chunking destroys table structure — rows/columns become a jumble of text. Tables usually need special parsing/serialization (e.g. to markdown or key-value pairs) before embedding." },
        { term: "What metadata should be stored?", back: "Source document/ID, section/page, timestamp/version, access permissions, and useful filter tags (department, doc type) — enables citation and scoped or hybrid retrieval." },
        { term: "What happens after retrieval?", back: "Retrieved chunks get assembled (often re-ranked/filtered for relevance) and inserted into the prompt alongside the user's question and instructions, before being sent to the LLM." },
        { term: "What is prompt augmentation?", back: "The step of injecting retrieved context — plus instructions like “answer only from the provided context” — into the prompt template before sending it to the model. Literally the “Augmented” in RAG." },
        { term: "How would you debug bad answers?", back: "Check retrieval first — inspect what chunks actually came back for the query. If retrieval is fine but the answer is wrong, check prompt assembly/instructions. If both are fine, check the source data for gaps or staleness." }

        { term: "What is nearest-neighbor search?", back: "Finding the k vectors in the index closest to a query vector by some distance metric (cosine, dot product, Euclidean) — the core operation behind semantic retrieval." },
        { term: "What is HNSW?", back: "Hierarchical Navigable Small World — a graph-based approximate nearest-neighbor index that searches millions of vectors in milliseconds, trading a little accuracy for large speed gains versus brute force." },

      back: "Through defined interfaces, not ad hoc scripts: an API/gateway layer that abstracts the model provider, respects existing auth/data constraints, and exposes tool-calling or RAG endpoints the rest of the platform can call — so the LLM becomes a component of the system, not a bolt-on." },
    { q: "How do you ensure governance and compliance?", ref: "Module 11 — Security & Governance",
      back: "Document data flows, model usage, and known limitations; enforce access control (RBAC) and PII protection; keep audit logs of inputs, outputs, and approvals; and keep a human oversight checkpoint for high-impact decisions — enough that a non-engineer reviewer can sign off." },
    { q: "How do you transfer prototypes into stable operating models?", ref: "Module 7 & 12 — Production Architecture / Scenarios",
      back: "Define who owns the system, how it's monitored, what the support/escalation process is, and what documentation/training exists — then harden the technical side (testing, CI/CD, rollback) so it can run and be maintained without its original builder in the room." }
  ];

  var state = {
    mode: "learn",
    view: "modules",
    moduleIdx: 0,
    cardIdx: 0,
    priorityIdx: 0,
    flipped: {},
    score: 0,
    streak: 0,
    quizQueue: [],
    quizTotal: 0,
    quizStarted: false,
    solved: {},
    currentQ: null,
    answered: false,
    lastChoice: null
  };

  function moduleMastered(mi) {
    var m = MODULES[mi];
    for (var i = 0; i < m.quiz.length; i++) {
      if (!state.solved[mi + "-" + i]) return false;
    }
    return true;
  }

  function masteredCount() {
    var c = 0;
    for (var i = 0; i < MODULES.length; i++) if (moduleMastered(i)) c++;
    return c;
  }

  function buildQueue() {
    var q = [];
    for (var mi = 0; mi < MODULES.length; mi++) {
      for (var qi = 0; qi < MODULES[mi].quiz.length; qi++) {
        var key = mi + "-" + qi;
        if (!state.solved[key]) q.push({ mi: mi, qi: qi, key: key });
      }
    }
    for (var i = q.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = q[i]; q[i] = q[j]; q[j] = tmp;
    }
    return q;
  }

  function renderHud() {
    document.getElementById("hud-score").textContent = state.score;
    document.getElementById("hud-streak").textContent = state.streak;
    document.getElementById("hud-mastered").textContent = masteredCount() + "/" + MODULES.length;
  }

  function renderRail() {
    var rail = document.getElementById("rail");
    var priorityActive = state.mode === "learn" && state.view === "priority";
    var html = '<button class="node priority' + (priorityActive ? " active" : "") + '" id="node-priority">' +
      '<span class="node-id">★</span><span class="node-label">Bet-Money 10</span></button>' +
      '<div class="rail-divider"></div>' +
      '<div class="rail-title">Modules</div>';
    MODULES.forEach(function (m, i) {
      var mastered = moduleMastered(i);
      var active = state.mode === "learn" && state.view === "modules" && i === state.moduleIdx;
      html += '<button class="node' + (active ? " active" : "") +
        (mastered ? " mastered" : "") + '" data-idx="' + i + '" role="listitem">' +
        '<span class="node-thread"></span>' +
        '<span class="node-id">' + (mastered ? "✓" : (i + 1)) + '</span>' +
        '<span class="node-label">' + m.title + '</span></button>';
    });
    rail.innerHTML = html;
    document.getElementById("node-priority").addEventListener("click", function () {
      state.view = "priority";
      setMode("learn");
    });
    Array.prototype.forEach.call(rail.querySelectorAll(".node[data-idx]"), function (btn) {
      btn.addEventListener("click", function () {
        state.moduleIdx = parseInt(btn.getAttribute("data-idx"), 10);
        state.cardIdx = 0;
        state.view = "modules";
        setMode("learn");
      });
    });
  }

  function renderLearn() {
    if (state.view === "priority") { renderPriorityLearn(); return; }
    var stage = document.getElementById("stage");
    var m = MODULES[state.moduleIdx];
    var card = m.cards[state.cardIdx];
    var flipKey = "m" + state.moduleIdx + "-" + state.cardIdx;
    var flipped = !!state.flipped[flipKey];

    var html = '<div class="stage-header">' +
      '<span class="stage-eyebrow">Module ' + (state.moduleIdx + 1) + ' of ' + MODULES.length + ' &middot; Learn</span>' +
      '<h2 class="stage-title">' + m.title + '</h2></div>';

    html += '<div class="flip-card' + (flipped ? " flipped" : "") + '" id="flip-card">' +
      '<div class="flip-inner">' +
      '<div class="flip-face flip-front"><span class="q-mark">Card ' + (state.cardIdx + 1) + ' / ' + m.cards.length + '</span>' +
      '<div class="term">' + card.term + '</div>' +
      '<span class="flip-hint">Click to flip</span></div>' +
      '<div class="flip-face flip-back"><div>' + card.back + '</div>' +
      '<span class="flip-hint">Click to flip back</span></div>' +
      '</div></div>';

    html += '<div class="stage-nav">' +
      '<button id="card-prev"' + (state.cardIdx === 0 ? " disabled" : "") + '>← Prev</button>' +
      '<span class="pos">' + (state.cardIdx + 1) + ' / ' + m.cards.length + '</span>' +
      '<button id="card-next"' + (state.cardIdx === m.cards.length - 1 ? " disabled" : "") + '>Next →</button>' +
      '</div>';

    stage.innerHTML = html;

    document.getElementById("flip-card").addEventListener("click", function () {
      state.flipped[flipKey] = !state.flipped[flipKey];
      renderLearn();
    });
    var prevBtn = document.getElementById("card-prev");
    var nextBtn = document.getElementById("card-next");
    if (prevBtn) prevBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      if (state.cardIdx > 0) { state.cardIdx--; renderLearn(); }
    });
    if (nextBtn) nextBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      if (state.cardIdx < m.cards.length - 1) { state.cardIdx++; renderLearn(); }
    });
  }

  function renderPriorityLearn() {
    var stage = document.getElementById("stage");
    var item = PRIORITY[state.priorityIdx];
    var flipKey = "p" + state.priorityIdx;
    var flipped = !!state.flipped[flipKey];

    var html = '<div class="stage-header">' +
      '<span class="stage-eyebrow priority">★ Bet-Money 10 &middot; ' + (state.priorityIdx + 1) + ' of ' + PRIORITY.length + '</span>' +
      '<h2 class="stage-title">Highest-probability questions</h2></div>';

    html += '<div class="flip-card' + (flipped ? " flipped" : "") + '" id="flip-card">' +
      '<div class="flip-inner">' +
      '<div class="flip-face flip-front"><span class="q-mark">Priority ' + (state.priorityIdx + 1) + ' / ' + PRIORITY.length + '</span>' +
      '<div class="term">' + item.q + '</div>' +
      '<span class="flip-hint">Click to flip</span></div>' +
      '<div class="flip-face flip-back priority-back"><div>' + item.back + '</div>' +
      '<div class="priority-ref">↳ Deep dive: ' + item.ref + '</div>' +
      '<span class="flip-hint">Click to flip back</span></div>' +
      '</div></div>';

    html += '<div class="stage-nav">' +
      '<button id="card-prev"' + (state.priorityIdx === 0 ? " disabled" : "") + '>← Prev</button>' +
      '<span class="pos">' + (state.priorityIdx + 1) + ' / ' + PRIORITY.length + '</span>' +
      '<button id="card-next"' + (state.priorityIdx === PRIORITY.length - 1 ? " disabled" : "") + '>Next →</button>' +
      '</div>';

    stage.innerHTML = html;

    document.getElementById("flip-card").addEventListener("click", function () {
      state.flipped[flipKey] = !state.flipped[flipKey];
      renderPriorityLearn();
    });
    var prevBtn = document.getElementById("card-prev");
    var nextBtn = document.getElementById("card-next");
    if (prevBtn) prevBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      if (state.priorityIdx > 0) { state.priorityIdx--; renderPriorityLearn(); }
    });
    if (nextBtn) nextBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      if (state.priorityIdx < PRIORITY.length - 1) { state.priorityIdx++; renderPriorityLearn(); }
    });
  }

  function nextQuizQuestion() {
    if (state.quizQueue.length === 0) {
      state.currentQ = null;
      renderQuiz();
      return;
    }
    state.currentQ = state.quizQueue.shift();
    state.answered = false;
    renderQuiz();
  }

  function totalQuestionCount() {
    var t = 0;
    MODULES.forEach(function (m) { t += m.quiz.length; });
    return t;
  }

  function remainingUnsolved() {
    var t = 0;
    MODULES.forEach(function (m, mi) {
      m.quiz.forEach(function (_, qi) {
        if (!state.solved[mi + "-" + qi]) t++;
      });
    });
    return t;
  }

  function renderQuiz() {
    var stage = document.getElementById("stage");
    renderHud();

    if (!state.currentQ) {
      var allDone = remainingUnsolved() === 0 && state.quizStarted;
      if (allDone) {
        stage.innerHTML =
          '<div class="empty-state"><div class="big">✓</div>' +
          '<h2>All ' + state.quizTotal + ' questions cleared</h2>' +
          '<p>Score ' + state.score + ' for this run. Restart to drill the whole set again, or jump back to Learn for a quick re-read.</p>' +
          '<button id="quiz-restart">Restart quiz</button></div>';
      } else {
        stage.innerHTML =
          '<div class="empty-state"><div class="big">→</div>' +
          '<h2>Ready when you are</h2>' +
          '<p>Starts a shuffled run across all ' + MODULES.length + ' modules (' + totalQuestionCount() + ' questions). Wrong answers get requeued so you see them again until they stick.</p>' +
          '<button id="quiz-restart">Start quiz</button></div>';
      }
      document.getElementById("quiz-restart").addEventListener("click", function () {
        state.solved = {};
        state.score = 0;
        state.streak = 0;
        state.quizStarted = true;
        state.quizTotal = totalQuestionCount();
        state.quizQueue = buildQueue();
        renderRail();
        nextQuizQuestion();
      });
      return;
    }

    var m = MODULES[state.currentQ.mi];
    var q = m.quiz[state.currentQ.qi];
    var solvedCount = state.quizTotal - remainingUnsolved();

    var html = '<div class="stage-header"><span class="stage-eyebrow">Quiz &middot; ' + solvedCount + ' / ' + state.quizTotal + ' cleared</span>' +
      '<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:' +
      Math.round(100 * (solvedCount / Math.max(state.quizTotal, 1))) + '%"></div></div></div>';

    html += '<div class="quiz-card"><span class="quiz-module-tag">' + m.title + '</span>' +
      '<div class="quiz-question">' + q.q + '</div>' +
      '<div class="quiz-options" id="quiz-options">';

    var letters = ["A", "B", "C", "D"];
    var disabledAttr = state.answered ? " disabled" : "";
    q.options.forEach(function (opt, i) {
      var cls = "quiz-option";
      if (state.answered) {
        if (i === q.a) cls += " correct";
        else if (i === state.lastChoice) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '"' + disabledAttr + '><span class="letter">' + letters[i] + '</span><span>' + opt + '</span></button>';
    });
    var fbClass = "quiz-feedback" + (state.answered ? (state.lastChoice === q.a ? " correct" : " wrong") : "");
    var fbText = state.answered ? (state.lastChoice === q.a ? "Correct." : "Not quite — this one will come back around.") : "";
    html += '</div><div class="' + fbClass + '" id="quiz-feedback">' + fbText + '</div>';
    if (state.answered) {
      html += '<button class="quiz-next" id="quiz-next">Next question →</button>';
    }
    html += '</div>';

    stage.innerHTML = html;

    Array.prototype.forEach.call(document.querySelectorAll(".quiz-option"), function (btn) {
      btn.addEventListener("click", function () {
        if (state.answered) return;
        var i = parseInt(btn.getAttribute("data-i"), 10);
        answerQuestion(i);
      });
    });
    var nextBtn = document.getElementById("quiz-next");
    if (nextBtn) nextBtn.addEventListener("click", nextQuizQuestion);
  }

  function answerQuestion(choice) {
    var m = MODULES[state.currentQ.mi];
    var q = m.quiz[state.currentQ.qi];
    var correct = choice === q.a;
    state.answered = true;
    state.lastChoice = choice;

    if (correct) {
      state.score++;
      state.streak++;
      state.solved[state.currentQ.key] = true;
    } else {
      state.streak = 0;
      var reinsertAt = Math.min(state.quizQueue.length, 2 + Math.floor(Math.random() * 3));
      state.quizQueue.splice(reinsertAt, 0, state.currentQ);
    }
    renderRail();
    renderQuiz();
  }

  function setMode(mode) {
    state.mode = mode;
    document.getElementById("btn-learn").classList.toggle("active", mode === "learn");
    document.getElementById("btn-quiz").classList.toggle("active", mode === "quiz");
    document.getElementById("btn-learn").setAttribute("aria-selected", mode === "learn");
    document.getElementById("btn-quiz").setAttribute("aria-selected", mode === "quiz");
    renderRail();
    if (mode === "learn") renderLearn();
    else renderQuiz();
  }

  document.getElementById("btn-learn").addEventListener("click", function () { setMode("learn"); });
  document.getElementById("btn-quiz").addEventListener("click", function () { setMode("quiz"); });

  state.quizTotal = totalQuestionCount();
  renderHud();
  renderRail();
  renderLearn();
})();
</script>
